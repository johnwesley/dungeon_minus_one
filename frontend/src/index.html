<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon -1</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="scanlines crt-vignette">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title glow">Dungeon -1</h1>
        <div class="user-handle-line">
          <span class="user-label">Player:</span>
          <span id="user-handle" class="user-handle">Loading...</span>
        </div>
      </div>

      <div class="sidebar-content">
        <!-- Feedback form (hidden by default, shown if enabled via API) -->
        <div id="feedback-panel" class="feedback-panel hidden">
          <div class="feedback-header">
            <span class="feedback-title">Send Feedback</span>
            <button class="feedback-dismiss" title="Close">&times;</button>
          </div>
          <form id="feedback-form" class="feedback-form">
            <div class="feedback-rating">
              <span class="rating-label">Rating:</span>
              <div class="star-rating">
                <button type="button" class="star" data-value="1">&#9734;</button>
                <button type="button" class="star" data-value="2">&#9734;</button>
                <button type="button" class="star" data-value="3">&#9734;</button>
                <button type="button" class="star" data-value="4">&#9734;</button>
                <button type="button" class="star" data-value="5">&#9734;</button>
              </div>
              <input type="hidden" id="feedback-rating-value" name="rating" value="0">
            </div>
            <textarea
              id="feedback-message"
              class="bbs-textarea"
              placeholder="Share your thoughts..."
              rows="5"
              required
            ></textarea>
            <button type="submit" class="bbs-btn feedback-submit">Submit</button>
            <div id="feedback-status" class="feedback-status"></div>
          </form>
        </div>

        <div id="notifications-panel" class="notifications-panel"></div>
      </div>

      <div class="sidebar-footer">
        <button id="restart-btn" class="bbs-btn bbs-btn-danger" style="width: 100%;">Restart</button>
        <button id="logout-btn" class="bbs-btn" style="width: 100%;">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="chat-container">
        <div id="chat-messages" class="chat-messages">
          <!-- Messages will be inserted here -->
        </div>

        <div class="input-area">
          <form id="chat-form" class="input-form">
            <textarea
              id="message-input"
              class="bbs-textarea"
              placeholder="What do you do?"
              rows="1"
            ></textarea>
            <button id="send-btn" type="submit" class="bbs-btn">Send</button>
          </form>
        </div>
      </div>
    </main>

    <!-- Right Panel -->
    <aside class="right-panel">
      <div class="panel-section">
        <div class="panel-title">LOCATION</div>
        <div id="current-location" class="panel-content">Unknown</div>
      </div>
      <div class="panel-section">
        <div class="panel-title">INVENTORY</div>
        <ul id="inventory-list" class="inventory-list">
          <li class="empty-inventory">Empty</li>
        </ul>
      </div>
      <div id="trophy-case-section" class="panel-section" style="display: none;">
        <div class="panel-title">TROPHY CASE (<span id="trophy-count">0</span>/13)</div>
        <ul id="trophy-case-list" class="inventory-list">
        </ul>
      </div>
    </aside>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
