<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Dungeon -1</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="scanlines crt-vignette">
  <div class="auth-container">
    <div class="auth-box">
      <h1 class="auth-title glow">Dungeon -1</h1>

      <div id="error-msg"></div>

      <form id="register-form" class="auth-form">
        <div>
          <label class="bbs-label" for="invite_code">Invite Code</label>
          <input type="text"
                 id="invite_code"
                 name="invite_code"
                 class="bbs-input"
                 required
                 autocomplete="off">
        </div>

        <div>
          <label class="bbs-label" for="username">Username</label>
          <input type="text"
                 id="username"
                 name="username"
                 class="bbs-input"
                 required
                 autocomplete="username">
        </div>

        <div>
          <label class="bbs-label" for="password">Password</label>
          <input type="password"
                 id="password"
                 name="password"
                 class="bbs-input"
                 required
                 autocomplete="new-password">
        </div>

        <button type="submit" class="bbs-btn">Create Account</button>
      </form>

      <p class="auth-link">
        Already have an account? <a href="/login.html">Login</a>
      </p>
    </div>
  </div>

  <script>
    (function () {
      const TOKEN_KEY = 'token';
      const form = document.getElementById('register-form');
      const errorMsg = document.getElementById('error-msg');
      const inviteInput = document.getElementById('invite_code');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      if (localStorage.getItem(TOKEN_KEY)) {
        window.location.href = '/';
        return;
      }

      function showError(message) {
        errorMsg.innerHTML = `<div class="bbs-error">${message}</div>`;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorMsg.innerHTML = '';

        try {
          const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              invite_code: inviteInput.value,
              username: usernameInput.value,
              password: passwordInput.value,
            }),
          });

          const data = await response.json().catch(() => ({}));

          if (response.ok && data.access_token) {
            localStorage.setItem(TOKEN_KEY, data.access_token);
            window.location.href = '/';
            return;
          }

          showError(data.detail || 'Registration failed');
        } catch (err) {
          showError('An error occurred. Please try again.');
        }
      });
    })();
  </script>
</body>
</html>
