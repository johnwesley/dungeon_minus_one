<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dungeon Minus 1</title>
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="scanlines crt-vignette">
  <div class="auth-container">
    <div class="auth-box">
      <h1 class="auth-title glow">Dungeon Minus 1</h1>

      <div id="error-msg"></div>

      <form id="login-form" class="auth-form"
            hx-post="/api/auth/login"
            hx-target="#error-msg"
            hx-swap="innerHTML">
        <div>
          <label class="bbs-label" for="username">Username</label>
          <input type="text"
                 id="username"
                 name="username"
                 class="bbs-input"
                 required
                 autocomplete="username">
        </div>

        <div>
          <label class="bbs-label" for="password">Password</label>
          <input type="password"
                 id="password"
                 name="password"
                 class="bbs-input"
                 required
                 autocomplete="current-password">
        </div>

        <button type="submit" class="bbs-btn">Enter</button>
      </form>

      <p class="auth-link">
        No account? <a href="/register.html">Request access</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { redirectIfAuthenticated, setToken, checkDevMode } from '../js/auth.js';

    // Redirect if already logged in
    redirectIfAuthenticated();

    // Check for dev mode and pre-fill credentials
    async function initDevMode() {
      const devMode = await checkDevMode();
      if (devMode) {
        document.getElementById('username').value = 'dev';
        document.getElementById('password').value = 'dev';
      }
    }
    initDevMode();

    // Handle successful login
    document.body.addEventListener('htmx:afterRequest', (event) => {
      if (event.detail.target.id === 'error-msg' && event.detail.successful) {
        const xhr = event.detail.xhr;
        if (xhr.status === 200) {
          try {
            const data = JSON.parse(xhr.response);
            if (data.access_token) {
              setToken(data.access_token);
              window.location.href = '/';
              return;
            }
          } catch (e) {
            // Not JSON, show as error
          }
        }
        // If we got here, there was an error - HTMX will swap the response into #error-msg
      }
    });

    // Handle errors - wrap in error styling
    document.body.addEventListener('htmx:beforeSwap', (event) => {
      if (event.detail.target.id === 'error-msg') {
        const xhr = event.detail.xhr;
        if (xhr.status !== 200) {
          try {
            const data = JSON.parse(xhr.response);
            event.detail.serverResponse = `<div class="bbs-error">${data.detail || 'Login failed'}</div>`;
          } catch (e) {
            event.detail.serverResponse = `<div class="bbs-error">Login failed</div>`;
          }
        }
      }
    });
  </script>
</body>
</html>
