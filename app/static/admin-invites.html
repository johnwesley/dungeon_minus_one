<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Approvals - Dungeon -1</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-primary);
        }
        .auth-box {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 720px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .auth-title {
            text-align: center;
            color: var(--text-accent);
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .auth-btn {
            padding: 0.6rem 1rem;
            background-color: var(--text-accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .auth-btn-danger {
            background-color: #ef4444;
            color: #fff;
        }
        .auth-link {
            text-align: center;
            margin-top: 1rem;
        }
        .notification {
            border: 1px solid var(--border-color);
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: var(--bg-primary);
        }
        .notification-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .success-msg {
            color: #4caf50;
        }
        .error-msg {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Invite Approvals</h1>

            <div class="form-group">
                <label for="status-filter">Status</label>
                <select id="status-filter">
                    <option value="pending" selected>Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="send-email" checked>
                    Send email automatically (Postmark)
                </label>
            </div>
            <button id="refresh-btn" class="auth-btn">Refresh</button>
            <div id="status-msg"></div>

            <div id="requests" style="margin-top: 1.5rem;"></div>

            <div class="auth-link"><a href="/">Back to game</a></div>
        </div>
    </div>

    <script>
        (function () {
            const CSRF_KEY = 'csrf_token';
            const statusFilter = document.getElementById('status-filter');
            const refreshBtn = document.getElementById('refresh-btn');
            const statusMsg = document.getElementById('status-msg');
            const requestsEl = document.getElementById('requests');
            const sendEmailToggle = document.getElementById('send-email');

            function showStatus(message, ok = true) {
                statusMsg.innerHTML = `<div class="${ok ? 'success-msg' : 'error-msg'}">${message}</div>`;
            }

            async function ensureSession() {
                try {
                    const response = await fetch('/api/auth/session', { credentials: 'same-origin', cache: 'no-store' });
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    if (!data.authenticated) throw new Error();
                    if (data.csrf_token) {
                        sessionStorage.setItem(CSRF_KEY, data.csrf_token);
                    }
                    return true;
                } catch (err) {
                    window.location.href = '/login.html';
                    return false;
                }
            }

            function getCsrfToken() {
                return sessionStorage.getItem(CSRF_KEY);
            }

            async function fetchRequests() {
                const status = statusFilter.value;
                const response = await fetch(`/api/admin/invite-requests?status=${encodeURIComponent(status)}`, {
                    credentials: 'same-origin',
                    cache: 'no-store',
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    showStatus(data.detail || 'Failed to load requests', false);
                    return [];
                }

                return await response.json();
            }

            function renderRequests(requests) {
                if (!requests.length) {
                    requestsEl.innerHTML = '<p>No requests found.</p>';
                    return;
                }

                requestsEl.innerHTML = requests.map(req => `
                    <div class="notification" data-id="${req.id}">
                        <div class="notification-header">
                            <strong>${req.email}</strong>
                            <span>${req.status}</span>
                        </div>
                        <div>Requested: ${req.requested_at || ''}</div>
                        <div>Notes: ${req.notes || '-'}</div>
                        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
                            <button class="auth-btn approve-btn" data-id="${req.id}">Approve</button>
                            <button class="auth-btn auth-btn-danger reject-btn" data-id="${req.id}">Reject</button>
                        </div>
                    </div>
                `).join('');

                requestsEl.querySelectorAll('.approve-btn').forEach(btn => {
                    btn.addEventListener('click', () => approveRequest(btn.dataset.id));
                });
                requestsEl.querySelectorAll('.reject-btn').forEach(btn => {
                    btn.addEventListener('click', () => rejectRequest(btn.dataset.id));
                });
            }

            async function approveRequest(requestId) {
                const notes = prompt('Optional approval notes (leave blank):') || null;
                const sendEmail = sendEmailToggle.checked;
                const response = await fetch(`/api/admin/invite-requests/${requestId}/approve`, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken() || '',
                    },
                    body: JSON.stringify({ send_email: sendEmail, notes }),
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    showStatus(data.detail || 'Approval failed', false);
                    return;
                }

                if (!data.sent && data.invite_token) {
                    showStatus(`Invite token: ${data.invite_token}`, true);
                } else {
                    showStatus('Invite approved and sent.', true);
                }
                await load();
            }

            async function rejectRequest(requestId) {
                const notes = prompt('Optional rejection notes (leave blank):') || null;
                const response = await fetch(`/api/admin/invite-requests/${requestId}/reject`, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken() || '',
                    },
                    body: JSON.stringify({ notes }),
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    showStatus(data.detail || 'Rejection failed', false);
                    return;
                }
                showStatus('Invite request rejected.', true);
                await load();
            }

            async function load() {
                const ok = await ensureSession();
                if (!ok) return;
                const requests = await fetchRequests();
                renderRequests(requests);
            }

            refreshBtn.addEventListener('click', load);
            statusFilter.addEventListener('change', load);

            load();
        })();
    </script>
</body>
</html>
