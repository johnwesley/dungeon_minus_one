<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Dungeon -1</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-primary);
        }
        .auth-box {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            color: var(--text-accent);
            margin-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .auth-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--text-accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        .auth-btn:hover {
            background-color: #d97706;
        }
        .auth-footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--text-accent);
            text-decoration: none;
        }
        .error-msg {
            color: #ef4444;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Register</h1>
                <p>Use your invite token to enter.</p>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="invite-token">Invite Token</label>
                    <input type="text" id="invite-token" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/static/login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        const CSRF_KEY = 'csrf_token';
        const form = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');
        const inviteInput = document.getElementById('invite-token');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        (async function redirectIfAuthenticated() {
            try {
                const response = await fetch('/api/auth/session', { credentials: 'same-origin', cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();
                if (data && data.authenticated) {
                    if (data.csrf_token) {
                        sessionStorage.setItem(CSRF_KEY, data.csrf_token);
                    }
                    window.location.href = '/';
                }
            } catch (err) {
                // ignore
            }
        })();

        (function prefillInviteToken() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('invite_token');
            if (token) {
                inviteInput.value = token;
            }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const invite_token = inviteInput.value;
            const username = usernameInput.value;
            const password = passwordInput.value;

            errorMsg.style.display = 'none';
            errorMsg.textContent = '';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ invite_token, username, password })
                });

                const data = await response.json().catch(() => ({}));

                if (response.ok && data.authenticated) {
                    if (data.csrf_token) {
                        sessionStorage.setItem(CSRF_KEY, data.csrf_token);
                    }
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
