<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dungeon -1</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-primary);
        }
        .auth-box {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-header h1 {
            color: var(--text-accent);
            margin-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .auth-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--text-accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        .auth-btn:hover {
            background-color: #d97706;
        }
        .auth-footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--text-accent);
            text-decoration: none;
        }
        .error-msg {
            color: #ef4444;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .success-msg {
            color: #4caf50;
            margin-top: 0.5rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .section-divider {
            border-top: 1px dashed var(--border-color);
            margin: 1.5rem 0;
        }
        .turnstile-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Dungeon Login</h1>
                <p>Enter the dungeon if you dare...</p>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="identifier">Email or Username</label>
                    <input type="text" id="identifier" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div class="section-divider"></div>

            <form id="invite-request-form">
                <div class="auth-header">
                    <h2>Request Access</h2>
                </div>
                <div class="form-group">
                    <label for="request-email">Email</label>
                    <input type="email" id="request-email" required>
                </div>
                <div id="turnstile-container" class="turnstile-container"></div>
                <button type="submit" class="auth-btn">Request Invite</button>
                <div id="request-msg" class="success-msg"></div>
            </form>

            <div class="auth-footer">
                <p>Already have an invite? <a href="/static/register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        const CSRF_KEY = 'csrf_token';
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const identifierInput = document.getElementById('identifier');
        const passwordInput = document.getElementById('password');
        const requestForm = document.getElementById('invite-request-form');
        const requestEmailInput = document.getElementById('request-email');
        const requestMsg = document.getElementById('request-msg');
        const turnstileContainer = document.getElementById('turnstile-container');
        let turnstileWidgetId = null;

        (async function redirectIfAuthenticated() {
            try {
                const response = await fetch('/api/auth/session', { credentials: 'same-origin', cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();
                if (data && data.authenticated) {
                    if (data.csrf_token) {
                        sessionStorage.setItem(CSRF_KEY, data.csrf_token);
                    }
                    window.location.href = '/';
                }
            } catch (err) {
                // ignore
            }
        })();

        (async function checkDevMode() {
            try {
                const response = await fetch('/api/auth/dev-mode');
                const data = await response.json();
                if (data.enabled) {
                    identifierInput.value = 'dev';
                    passwordInput.value = 'dev';
                }
            } catch (err) {
                // Ignore errors
            }
        })();

        async function initTurnstile() {
            try {
                const response = await fetch('/api/auth/turnstile-key', { cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();
                if (!data.site_key) return;

                const waitForTurnstile = setInterval(() => {
                    if (window.turnstile) {
                        clearInterval(waitForTurnstile);
                        turnstileWidgetId = window.turnstile.render(turnstileContainer, { sitekey: data.site_key });
                    }
                }, 100);
            } catch (err) {
                // ignore
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = identifierInput.value;
            const password = passwordInput.value;

            errorMsg.style.display = 'none';
            errorMsg.textContent = '';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json().catch(() => ({}));

                if (response.ok && data.authenticated) {
                    if (data.csrf_token) {
                        sessionStorage.setItem(CSRF_KEY, data.csrf_token);
                    }
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }
        });

        requestForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            requestMsg.style.display = 'none';
            requestMsg.textContent = '';

            const turnstileToken = turnstileWidgetId !== null && window.turnstile
                ? window.turnstile.getResponse(turnstileWidgetId)
                : '';

            try {
                const response = await fetch('/api/auth/invite-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        email: requestEmailInput.value,
                        turnstile_token: turnstileToken,
                    })
                });

                const data = await response.json().catch(() => ({}));
                if (response.ok) {
                    requestMsg.textContent = 'Request received. We will email you if approved.';
                    requestMsg.style.display = 'block';
                    requestEmailInput.value = '';
                    if (turnstileWidgetId !== null && window.turnstile) {
                        window.turnstile.reset(turnstileWidgetId);
                    }
                } else {
                    errorMsg.textContent = data.detail || 'Request failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            }
        });

        initTurnstile();
    </script>
</body>
</html>
